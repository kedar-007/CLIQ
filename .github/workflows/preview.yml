name: Preview

on:
  pull_request:
    types:
      - opened
      - synchronize

env:
  PNPM_VERSION: 8.15.1
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  deploy-preview:
    name: Deploy Vercel Preview
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build --filter=./packages/*

      - name: Deploy to Vercel
        id: vercel-deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/web
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-comment: false

      - name: Post preview comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deploymentUrl = '${{ steps.vercel-deploy.outputs.preview-url }}';
            const sha = context.sha.substring(0, 7);
            const prNumber = context.issue.number;

            const body = [
              '## Preview Deployment',
              '',
              `| | |`,
              `|---|---|`,
              `| **Status** | Deployed |`,
              `| **Preview URL** | [${deploymentUrl}](${deploymentUrl}) |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Branch** | \`${context.payload.pull_request.head.ref}\` |`,
              '',
              '> This preview will be automatically updated on each push to this PR.',
            ].join('\n');

            // Find existing preview comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existingComment = comments.find(
              c => c.body.includes('## Preview Deployment') && c.user.type === 'Bot'
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
