name: AWS Dev Infra

on:
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
  push:
    branches:
      - main
    paths:
      - "infra/terraform/**"
      - ".github/workflows/aws-dev-infra.yml"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_IN_AUTOMATION: "true"

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        shell: bash
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.AWS_TF_STATE_BUCKET }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${{ vars.AWS_TF_LOCK_TABLE }}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan \
            -var-file=dev.tfvars.example \
            -var="cluster_name=${{ vars.AWS_DEV_CLUSTER_NAME }}" \
            -var="domain_name=${{ vars.AWS_DEV_DOMAIN_NAME }}" \
            -var="db_password=${{ secrets.DEV_DB_PASSWORD }}"

      - name: Terraform apply
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply'
        run: |
          terraform apply -auto-approve \
            -var-file=dev.tfvars.example \
            -var="cluster_name=${{ vars.AWS_DEV_CLUSTER_NAME }}" \
            -var="domain_name=${{ vars.AWS_DEV_DOMAIN_NAME }}" \
            -var="db_password=${{ secrets.DEV_DB_PASSWORD }}"
