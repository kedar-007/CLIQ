name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

env:
  PNPM_VERSION: 8.15.1
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build shared packages
        run: pnpm build --filter=./packages/*

      - name: Type check
        run: pnpm exec tsc --noEmit --project tsconfig.json || true

  # ──────────────────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.service }}-service)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - chat
          - call
          - notification
          - file
          - search
          - ai
          - task
          - billing

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: comms
          POSTGRES_PASSWORD: comms_test
          POSTGRES_DB: comms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://comms:comms_test@localhost:5432/comms_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-ci-only
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build --filter=./packages/*

      - name: Run tests
        run: pnpm test --filter=@comms/${{ matrix.service }}-service

  # ──────────────────────────────────────────────────────────────────────────────
  build:
    name: Build All
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build --filter=./packages/*

      - name: Build all services
        run: pnpm build --filter=./services/*

      - name: Build web app
        run: pnpm build --filter=@comms/web
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/*/dist
            services/*/dist
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - chat-service
          - call-service
          - notification-service
          - file-service
          - search-service
          - calendar-service
          - task-service
          - bot-service
          - integration-service
          - ai-service
          - analytics-service
          - billing-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: comms/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
