apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: comms-ingress
  namespace: comms-prod
  labels:
    app.kubernetes.io/name: comms-ingress
    app.kubernetes.io/part-of: comms-platform
  annotations:
    # Nginx Ingress Controller
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"

    # SSL / cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.dsvcliq.com,https://admin.dsvcliq.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-Request-ID"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "1728000"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: SAMEORIGIN";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Strict-Transport-Security: max-age=63072000; includeSubDomains; preload";

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"

    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$http_upgrade"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.dsvcliq.com
      secretName: api-dsvcliq-com-tls
  rules:
    - host: api.dsvcliq.com
      http:
        paths:
          - path: /api/auth/
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3001

          - path: /api/chat/
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 3002

          - path: /socket.io/
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 3002

          - path: /api/calls/
            pathType: Prefix
            backend:
              service:
                name: call-service
                port:
                  number: 3003

          - path: /api/notifications/
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 3004

          - path: /api/files/
            pathType: Prefix
            backend:
              service:
                name: file-service
                port:
                  number: 3005

          - path: /api/search/
            pathType: Prefix
            backend:
              service:
                name: search-service
                port:
                  number: 3006

          - path: /api/calendar/
            pathType: Prefix
            backend:
              service:
                name: calendar-service
                port:
                  number: 3007

          - path: /api/tasks/
            pathType: Prefix
            backend:
              service:
                name: task-service
                port:
                  number: 3008

          - path: /api/bots/
            pathType: Prefix
            backend:
              service:
                name: bot-service
                port:
                  number: 3009

          - path: /api/integrations/
            pathType: Prefix
            backend:
              service:
                name: integration-service
                port:
                  number: 3010

          - path: /api/ai/
            pathType: Prefix
            backend:
              service:
                name: ai-service
                port:
                  number: 3011

          - path: /api/analytics/
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 3012

          - path: /api/billing/
            pathType: Prefix
            backend:
              service:
                name: billing-service
                port:
                  number: 3013
