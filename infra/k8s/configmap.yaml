apiVersion: v1
kind: ConfigMap
metadata:
  name: comms-config
  namespace: comms-prod
  labels:
    app.kubernetes.io/name: comms-platform
    app.kubernetes.io/component: config
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"

  # Redis - host/port provided here; password in Secret
  REDIS_HOST: "redis-master.comms-prod.svc.cluster.local"
  REDIS_PORT: "6379"

  # Database - host/port provided here; full URL with credentials in Secret
  DB_HOST: "postgres.comms-prod.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "comms_prod"

  # Application config
  API_BASE_URL: "https://api.dsvcliq.com"
  WEB_BASE_URL: "https://app.dsvcliq.com"
  CORS_ORIGINS: "https://app.dsvcliq.com,https://admin.dsvcliq.com"

  # Timeouts and limits
  REQUEST_TIMEOUT_MS: "30000"
  MAX_UPLOAD_SIZE_MB: "100"

  # Feature flags
  ENABLE_AI_FEATURES: "true"
  ENABLE_ANALYTICS: "true"
  ENABLE_BILLING: "true"

  # Rate limiting
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"

  # Email
  EMAIL_FROM: "noreply@dsvcliq.com"
  EMAIL_FROM_NAME: "DSV-CLIQ"

  # File storage
  S3_REGION: "us-east-1"
  S3_BUCKET: "comms-files-prod"

  # Tracing / observability
  OTEL_SERVICE_NAME: "comms-platform"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4318"
