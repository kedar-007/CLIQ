# IMPORTANT: Replace ALL placeholder values with real base64-encoded secrets before applying.
# Generate base64: echo -n "your-secret-value" | base64
# Apply with: kubectl apply -f infra/k8s/secrets.yaml
#
# For production, consider using AWS Secrets Manager + External Secrets Operator
# instead of storing secret values in this file.

apiVersion: v1
kind: Secret
metadata:
  name: comms-secrets
  namespace: comms-prod
  labels:
    app.kubernetes.io/name: comms-platform
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # JWT signing secret
  # Replace with: echo -n "your-jwt-secret-min-32-chars" | base64
  JWT_SECRET: eW91ci1qd3Qtc2VjcmV0LW1pbi0zMi1jaGFycw==

  # Full PostgreSQL connection string
  # Replace with: echo -n "postgresql://user:password@host:5432/dbname" | base64
  DATABASE_URL: cG9zdGdyZXNxbDovL2NvbW1zOnBhc3N3b3JkQHBvc3RncmVzLmNvbW1zLXByb2Quc3ZjLmNsdXN0ZXIubG9jYWw6NTQzMi9jb21tc19wcm9k

  # Full Redis connection string
  # Replace with: echo -n "redis://:password@host:6379" | base64
  REDIS_URL: cmVkaXM6Ly86cGFzc3dvcmRAcmVkaXMtbWFzdGVyLmNvbW1zLXByb2Quc3ZjLmNsdXN0ZXIubG9jYWw6NjM3OQ==

  # Stripe secret key
  # Replace with: echo -n "sk_live_..." | base64
  STRIPE_SECRET_KEY: c2tfbGl2ZV9yZXBsYWNlX3dpdGhfcmVhbF9zdHJpcGVfa2V5

  # Stripe webhook signing secret
  # Replace with: echo -n "whsec_..." | base64
  STRIPE_WEBHOOK_SECRET: d2hzZWNfcmVwbGFjZV93aXRoX3JlYWxfd2ViaG9va19zZWNyZXQ=

  # OpenAI API key
  # Replace with: echo -n "sk-..." | base64
  OPENAI_API_KEY: c2stcmVwbGFjZV93aXRoX3JlYWxfb3BlbmFpX2tleQ==

  # AWS credentials for S3 / SES access from within services
  # Replace with actual values
  AWS_ACCESS_KEY_ID: cmVwbGFjZV93aXRoX3JlYWxfYXdzX2FjY2Vzc19rZXlfaWQ=
  AWS_SECRET_ACCESS_KEY: cmVwbGFjZV93aXRoX3JlYWxfYXdzX3NlY3JldF9hY2Nlc3Nfa2V5

  # Refresh token secret (different from JWT_SECRET)
  # Replace with: echo -n "your-refresh-secret-min-32-chars" | base64
  JWT_REFRESH_SECRET: eW91ci1yZWZyZXNoLXNlY3JldC1taW4tMzItY2hhcnM=

  # Twilio credentials (for call/notification service)
  # Replace with actual values
  TWILIO_ACCOUNT_SID: cmVwbGFjZV93aXRoX3JlYWxfdHdpbGlvX2FjY291bnRfc2lk
  TWILIO_AUTH_TOKEN: cmVwbGFjZV93aXRoX3JlYWxfdHdpbGlvX2F1dGhfdG9rZW4=

  # SendGrid API key (for email notifications)
  # Replace with: echo -n "SG...." | base64
  SENDGRID_API_KEY: cmVwbGFjZV93aXRoX3JlYWxfc2VuZGdyaWRfYXBpX2tleQ==

  # Encryption key for sensitive data at rest (32 bytes)
  # Replace with: openssl rand -base64 32 | tr -d '\n' | base64
  ENCRYPTION_KEY: cmVwbGFjZV93aXRoX3JlYWxfMzJfYnl0ZV9lbmNyeXB0aW9uX2tleQ==
