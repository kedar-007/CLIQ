{{- $serviceList := list "web" "auth" "chat" "call" "notification" "file" "search" "calendar" "task" "bot" "integration" "ai" "analytics" "billing" }}
{{- range $serviceName := $serviceList }}
{{- $serviceValues := index $.Values.services $serviceName }}
{{- if $serviceValues.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $serviceName }}-service
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "comms.serviceLabels" (dict "serviceName" $serviceName "context" $) | nindent 4 }}
spec:
  replicas: {{ $serviceValues.replicaCount }}
  selector:
    matchLabels:
      {{- include "comms.serviceSelectorLabels" (dict "serviceName" $serviceName "context" $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "comms.serviceSelectorLabels" (dict "serviceName" $serviceName "context" $) | nindent 8 }}
    spec:
      containers:
        - name: {{ $serviceName }}-service
          image: {{ include "comms.serviceImage" (dict "serviceValues" $serviceValues "context" $) }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $serviceValues.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ default "/health" $serviceValues.service.healthPath }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ default "/health" $serviceValues.service.healthPath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml $serviceValues.resources | nindent 12 }}
          {{- if $.Values.sharedEnvFrom }}
          envFrom:
            {{- toYaml $.Values.sharedEnvFrom | nindent 12 }}
          {{- end }}
          {{- if $serviceValues.env }}
          env:
            {{- range $key, $value := $serviceValues.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $serviceName }}-service
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "comms.serviceLabels" (dict "serviceName" $serviceName "context" $) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $serviceValues.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "comms.serviceSelectorLabels" (dict "serviceName" $serviceName "context" $) | nindent 4 }}
{{- end }}
{{- end }}
