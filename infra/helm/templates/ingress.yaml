{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "comms.fullname" . }}-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - secretName: {{ .Values.ingress.tls.secretName }}
      hosts:
        {{- range .Values.ingress.tls.hosts }}
        - {{ . }}
        {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.webHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-service
                port:
                  number: {{ .Values.services.web.service.port }}
    - host: {{ .Values.ingress.apiHost }}
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: {{ .Values.services.auth.service.port }}
          - path: /notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: {{ .Values.services.notification.service.port }}
          - path: /files
            pathType: Prefix
            backend:
              service:
                name: file-service
                port:
                  number: {{ .Values.services.file.service.port }}
          - path: /calls
            pathType: Prefix
            backend:
              service:
                name: call-service
                port:
                  number: {{ .Values.services.call.service.port }}
    - host: {{ .Values.ingress.chatHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: {{ .Values.services.chat.service.port }}
    - host: {{ .Values.ingress.callHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: call-service
                port:
                  number: {{ .Values.services.call.service.port }}
{{- end }}
